<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Profile – GigsFill</title>
  <meta name="description" content="View this artist's profile, upcoming gigs, videos, and booking info on GigsFill.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/png" href="/app/static/img/gigsfill-logo_square.png">
  <link rel="manifest" href="/app/static/manifest.json">
  <link rel="apple-touch-icon" href="/app/static/img/gigsfill-logo_square.png">
  <meta name="theme-color" content="#0f1419">
  <meta property="og:type" content="profile">
  <meta property="og:title" content="Artist Profile – GigsFill">
  <meta property="og:description" content="View this artist's profile, upcoming gigs, videos, and booking info on GigsFill.">
  <meta property="og:site_name" content="GigsFill">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Artist Profile – GigsFill">
  <meta name="twitter:description" content="View this artist's profile on GigsFill.">
  <link href="/app/static/css/gigsfill.css" rel="stylesheet">
  <link href="/app/static/css/mobile.css" rel="stylesheet">
  <link href="/app/static/css/modals.css?v=4" rel="stylesheet">
  <style>
    :root { --card-padding: 16px 20px; --card-gap: 10px; --section-title-size: 0.7rem; }
    .profile-container { max-width: 1100px; margin: 0 auto; padding: 0 20px 20px; }

    /* LOGO HERO — always visible */
    .logo-hero { text-align: center; padding: 20px 20px 16px; }
    .profile-pic {
      width: 100%; max-width: 500px; height: 140px; object-fit: contain; background: var(--card, #111);
      border-radius: 8px; margin: 0 auto 12px; display: block; border: 2px solid var(--border);
    }
    .artist-name {
      font-size: 1.75rem; font-weight: 700; margin: 0 0 4px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .artist-location { font-size: 0.85rem; color: var(--text-gray); margin: 0; }

    /* TABS */
    .profile-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .profile-tabs button {
      flex-shrink: 0; padding: 10px 16px; background: none; border: none;
      border-bottom: 2px solid transparent; color: var(--text-gray);
      font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .profile-tabs button:hover { color: var(--text); }
    .profile-tabs button.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .content-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: var(--card-padding); margin-bottom: var(--card-gap);
    }
    .content-card > h2 {
      font-size: var(--section-title-size); font-weight: 700; color: var(--cyan);
      text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px;
      padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* Info section */
    .artist-type-badge {
      display: inline-block; padding: 5px 14px; background: rgba(139,92,246,0.12);
      border: 1px solid rgba(139,92,246,0.25); border-radius: 20px;
      color: var(--purple); font-size: 0.75rem; font-weight: 600; margin-top: 6px;
    }
    .artist-type-badge:empty { display: none; }
    .artist-bio { margin-top: 14px; font-size: 0.875rem; line-height: 1.6; color: var(--text); white-space: pre-line; }
    .artist-bio:empty { display: none; }
    .booking-contact {
      margin-top: 14px; padding: 10px 18px; background: rgba(6,182,212,0.08);
      border: 1px solid rgba(6,182,212,0.2); border-radius: 8px;
      color: var(--cyan); font-size: 0.8rem; font-weight: 500; display: inline-block;
    }
    .booking-contact:empty { display: none; }

    /* Calendar */
    .cal-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .cal-toolbar h3 { margin: 0; font-size: 1.3rem; color: var(--text); font-weight: 600; }
    .cal-toolbar button {
      background: transparent; border: 1px solid var(--border);
      color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s;
    }
    .cal-toolbar button:hover { background: rgba(255,255,255,0.05); border-color: var(--cyan); color: var(--cyan); }
    .cal-header {
      display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
      color: var(--text-gray); font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
    .cal-day {
      background: rgba(8, 11, 22, 0.97); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; min-height: 130px; padding: 8px 4px;
      cursor: pointer; position: relative; transition: all 0.2s;
      display: flex; flex-direction: column;
      width: 100%; min-width: 0; box-sizing: border-box; overflow: hidden;
    }
    .cal-day:hover { background: rgba(18, 22, 38, 0.98); border-color: rgba(124, 107, 255, 0.45); }
    .cal-day.empty { background: rgba(14, 17, 28, 0.6); border-color: rgba(255,255,255,0.04); cursor: default; }
    .cal-day .day-num { position: absolute; top: 8px; right: 10px; font-size: 0.75rem; color: rgba(255,255,255,0.55); font-weight: 500; margin-bottom: 0; }
    .cal-day.today { border-color: var(--cyan); }
    .cal-day.past { opacity: 0.5; background: rgba(0,0,0,0.2); cursor: default; }
    .cal-day.past:hover { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.08); }
    .cal-day.past .day-num { color: rgba(255,255,255,0.3); }
    /* Gig pills */
    .cal-gig {
      padding: 2px 8px; border-radius: 6px; margin-bottom: 4px;
      font-size: 0.65rem; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
      transition: all 0.2s; max-width: 100%;
    }
    .cal-gig:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .cal-gig.booked { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .cal-gig.open { background: linear-gradient(135deg, #10b981, #059669); color: #000 !important; }
    /* Scrollable gigs container */
    .cal-gigs-container {
      max-height: 100px; overflow-y: auto; overflow-x: hidden; margin-top: 26px; padding-right: 4px;
      scrollbar-width: thin; scrollbar-color: var(--accent-purple) rgba(0,0,0,0.2);
    }
    .cal-gigs-container::-webkit-scrollbar { width: 6px; }
    .cal-gigs-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
    .cal-gigs-container::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); border-radius: 3px; }
    .cal-gigs-container .cal-gig { margin-top: 0; }
    .cal-gigs-container .cal-gig:last-child { margin-bottom: 0; }

    /* Gig Detail Modal */
    .gig-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; z-index: 10000;
    }
    .gig-modal-overlay.hidden { display: none; }
    .gig-modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 28px 32px; max-width: 480px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      max-height: 90vh; overflow-y: auto;
    }
    .gig-modal.day-modal {
      max-width: min(980px, 96vw);
      width: fit-content;
      min-width: min(900px, 96vw);
      padding: 24px;
    }
    .gig-modal.day-modal .gig-row {
      font-size: 0.7rem;
      font-weight: 700;
    }
    .gig-modal.day-modal h3 {
      margin: 0 0 18px; font-size: 1rem; font-weight: 700; color: var(--text);
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .gig-modal-row {
      display: flex; justify-content: space-between; padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .gig-modal-row:last-of-type { border-bottom: none; }
    .gig-modal-label { font-size: 0.75rem; color: var(--text-gray); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .gig-modal-value { font-size: 0.8rem; color: var(--text); font-weight: 500; text-align: right; }
    .gig-modal-close {
      margin-top: 18px; width: 100%; padding: 10px; background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text-gray);
      font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .gig-modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .gig-modal-value a { color: var(--cyan); text-decoration: none; }
    .gig-modal-value a:hover { text-decoration: underline; }

    /* Social Media */
    .social-links { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    .social-link {
      display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-gray); text-decoration: none;
      font-size: 1rem; font-weight: 600; transition: all 0.2s;
    }
    .social-link span:first-child { font-size: 1.3rem; }
    .social-link:hover { background: rgba(139,92,246,0.15); border-color: var(--purple); color: var(--purple); transform: translateX(3px); }

    /* Media */
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .media-card {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.2s;
    }
    .media-card:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
    .media-card img { width: 100%; height: 80px; object-fit: cover; display: block; }
    .media-title-label {
      padding: 6px 8px; font-size: 0.65rem; color: var(--text-gray);
      text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: rgba(0,0,0,0.3);
    }
    .audio-container { display: flex; flex-direction: column; gap: 6px; }
    .audio-row {
      display: flex; align-items: center; gap: 12px; padding: 8px 12px;
      background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 6px;
    }
    .audio-row:hover { border-color: var(--purple); }
    .audio-row strong { flex: 0 0 160px; max-width: 160px; font-size: 0.75rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .audio-row audio { flex: 1; height: 28px; }
    .empty-msg { color: var(--text-gray); font-size: 0.82rem; text-align: center; padding: 24px 0; }

    /* Media Modal */
    #mediaModal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer; }
    #mediaModal.hidden { display: none; }
    #mediaModalContent img, #mediaModalContent video { max-width: 90vw; max-height: 90vh; border-radius: 10px; }
    #mediaModalContent iframe { border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }

    @media (max-width: 600px) {
      .profile-pic { height: 100px; }
      .artist-name { font-size: 1.4rem; }
      .media-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .audio-row { flex-wrap: wrap; }
      .audio-row strong { flex: 1 1 100%; max-width: none; }
      .audio-row audio { flex: 1 1 100%; }
      .cal-gig { font-size: 0.55rem; }
      .cal-day { min-height: 90px; padding: 6px; }
      .cal-gigs-container { margin-top: 20px; max-height: 70px; }
      .gig-modal { padding: 20px 24px; }
      .profile-tabs button { padding: 8px 10px; font-size: 0.7rem; }
    }
  </style>
  <script src="/app/static/js/security.js"></script>
  <script src="/app/static/js/time-format.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="logo"><img src="/app/static/img/gigsfill-logo.png" alt="GigsFill" style="height:44px;width:auto;flex-shrink:0;"></div>
      <div class="header-actions"><a class="btn ghost" href="/app/index.html">Home</a></div>
    </div>
  </header>

  <main class="profile-container">
    <div class="logo-hero">
      <img id="artistLogo" class="profile-pic" src="/app/static/img/profile-placeholder.svg" alt="Artist photo"
        onerror="this.onerror=null;this.src='/app/static/img/profile-placeholder.svg';">
      <h1 class="artist-name" id="artistName">Artist</h1>
      <div class="artist-location" id="artistLocation"></div>
    </div>

    <div class="profile-tabs" id="profileTabs">
      <button onclick="switchTab('info')">Artist Info</button>
      <button class="active" onclick="switchTab('calendar')">Calendar</button>
      <button onclick="switchTab('videos')">Videos</button>
      <button onclick="switchTab('pictures')">Pictures</button>
      <button onclick="switchTab('audio')">Audio</button>
      <button onclick="switchTab('social')">Social Media</button>
      <button onclick="switchTab('reviews')">Reviews</button>
    </div>

    <div class="tab-panel" id="tab-info">
      <div class="content-card" style="text-align:center;">
        <div class="artist-type-badge" id="artistType"></div>
        <div class="artist-bio" id="artistBio"></div>
        <div class="booking-contact" id="artistBooking"></div>
      </div>
    </div>

    <div class="tab-panel active" id="tab-calendar">
      <div class="content-card">
        <div class="cal-toolbar">
          <button onclick="changeMonth(-1)">◀ Prev</button>
          <h3 id="calMonth"></h3>
          <button onclick="changeMonth(1)">Next ▶</button>
        </div>
        <div class="cal-header"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-videos">
      <div class="content-card"><div class="media-grid" id="videos"></div><div class="empty-msg" id="videosEmpty" style="display:none;">No videos uploaded yet.</div></div>
    </div>
    <div class="tab-panel" id="tab-pictures">
      <div class="content-card"><div class="media-grid" id="pictures"></div><div class="empty-msg" id="picturesEmpty" style="display:none;">No pictures uploaded yet.</div></div>
    </div>
    <div class="tab-panel" id="tab-audio">
      <div class="content-card"><div class="audio-container" id="audio"></div><div class="empty-msg" id="audioEmpty" style="display:none;">No audio uploaded yet.</div></div>
    </div>
    <div class="tab-panel" id="tab-social">
      <div class="content-card"><div class="social-links" id="socialMedia"></div><div class="empty-msg" id="socialEmpty" style="display:none;">No social media links added yet.</div></div>
    </div>
    <div class="tab-panel" id="tab-reviews">
      <div class="content-card">
        <div id="ratingSummaryContainer" style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);"></div>
        <div id="reviewsListContainer"></div>
      </div>
    </div>
  </main>

  <div class="hidden" id="mediaModal"><div id="mediaModalContent"></div></div>
  <div class="gig-modal-overlay hidden" id="gigModal">
    <div class="gig-modal">
      <h3>Gig Details</h3>
      <div id="gigModalBody"></div>
      <div class="modal-actions" style="margin-top:16px;display:flex;justify-content:flex-end;"><button class="btn ghost" onclick="closeGigModal()">Close</button></div>
    </div>
  </div>

<!-- Lightbox modal (required by openModal/closeModal JS) -->
<div id="lightboxOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;">
  <button onclick="closeModal()" style="position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;line-height:1;">✕</button>
  <div id="lightboxContent"></div>
</div>
  <script>
    const TAB_NAMES = ['info','calendar','videos','pictures','audio','social','reviews'];
    function switchTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.profile-tabs button').forEach(b => b.classList.remove('active'));
      const panel = document.getElementById('tab-' + name);
      if (panel) panel.classList.add('active');
      const idx = TAB_NAMES.indexOf(name);
      const btns = document.querySelectorAll('.profile-tabs button');
      if (btns[idx]) btns[idx].classList.add('active');
      // Lazy-load reviews tab
      if (name === 'reviews' && typeof renderRatingSummary !== 'undefined') {
        const params = new URLSearchParams(window.location.search);
        const aid = params.get('artist_id');
        if (aid) {
          renderRatingSummary('ratingSummaryContainer', parseInt(aid));
          renderReviews('reviewsListContainer', parseInt(aid));
        }
      }
    }

    let artist = null, artistGigs = [], calYear, calMonth;
    const params = new URLSearchParams(window.location.search);
    let artistId = params.get("artist_id");

    (async function loadArtist() {
      if (!artistId) {
        const meRes = await fetch("/api/me", { credentials: "include" });
        if (!meRes.ok) return;
        const me = await meRes.json();
        if (!me.artist_id) return;
        artistId = me.artist_id;
      }
      const res = await fetch(`/api/artists/${artistId}`, { credentials: "include" });
      if (!res.ok) return;
      artist = await res.json();

      document.getElementById("artistName").textContent = artist.name || "";
      document.getElementById("artistLocation").textContent = [artist.city, artist.state].filter(Boolean).join(", ");
      document.title = (artist.name || "Artist") + " – GigsFill";
      // Dynamic SEO updates
      const seoDesc = `${artist.name || 'Artist'}${artist.city ? ' from ' + artist.city + ', ' + artist.state : ''} – ${artist.artist_type || 'musician'} on GigsFill. View profile, upcoming gigs, and booking info.`;
      document.querySelector('meta[name="description"]')?.setAttribute('content', seoDesc);
      document.querySelector('meta[property="og:title"]')?.setAttribute('content', document.title);
      document.querySelector('meta[property="og:description"]')?.setAttribute('content', seoDesc);
      document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', document.title);
      document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', seoDesc);

      let typeText = artist.artist_type || "";
      if (artist.artist_type === "Live Band" && artist.band_formats) typeText += " • " + artist.band_formats.replace(/,/g, ", ");
      document.getElementById("artistType").textContent = typeText;
      document.getElementById("artistBio").textContent = (artist.bio || "").trim();
      document.getElementById("artistBooking").textContent = artist.booking_contact ? `Booking: ${artist.booking_contact}` : "";

      const ensureProto = u => { if (!u) return ''; const t = u.trim(); return (t.startsWith('http://') || t.startsWith('https://')) ? t : 'https://' + t; };
      const links = [
        { url: artist.spotify_url, label: "Spotify", icon: "🎵" },
        { url: artist.instagram_url, label: "Instagram", icon: "📷" },
        { url: artist.facebook_url, label: "Facebook", icon: "👥" },
        { url: artist.youtube_url, label: "YouTube", icon: "▶️" },
        { url: artist.twitter_url, label: "Twitter/X", icon: "🐦" },
        { url: artist.tiktok_url, label: "TikTok", icon: "🎬" },
        { url: artist.website_url, label: "Website", icon: "🌐" }
      ].filter(l => l.url && l.url.trim());
      if (links.length > 0) {
        document.getElementById("socialMedia").innerHTML = links.map(l => `<a href="${ensureProto(l.url)}" target="_blank" rel="noopener noreferrer" class="social-link"><span>${l.icon}</span><span>${l.label}</span></a>`).join('');
      } else { document.getElementById("socialEmpty").style.display = "block"; }

      document.getElementById("artistLogo").src = "/app/static/img/profile-placeholder.svg";
      loadMedia();
      loadGigs();
    })();

    // ========== CALENDAR ==========
    async function loadGigs() {
      try { const r = await fetch(`/api/artists/${artistId}/gigs/public`); if (r.ok) artistGigs = await r.json(); } catch(e) {}
      const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth();
      renderCalendar();
    }
    function changeMonth(d) { calMonth += d; if (calMonth > 11) { calMonth = 0; calYear++; } if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
    function renderCalendar() {
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('calMonth').textContent = `${months[calMonth]} ${calYear}`;
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const _now = new Date();
      const todayStr = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
      const icons = { 'Live Band': '🎸', 'DJ': '🎧', 'Comedian': '🎤', 'Trivia Host': '🧠' };
      let html = '';
      for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = ds === todayStr;
        const isPast = ds < todayStr;
        const dayGigs = artistGigs.filter(g => g.date === ds);
        const dayClickAttr = (!isPast && dayGigs.length > 0) ? ` onclick="openDayGigsModal(event,'${ds}')"` : '';
        html += `<div class="cal-day${isToday ? ' today' : ''}${isPast ? ' past' : ''}"${dayClickAttr}><div class="day-num">${d}</div>`;
        if (dayGigs.length > 0) {
          html += '<div class="cal-gigs-container">';
          dayGigs.forEach((g, idx) => {
            const hasBookedSlots = g.is_multi_slot && g.booked_slots_count > 0;
            const cls = (g.status === 'booked' || hasBookedSlots) ? 'booked' : 'open';
            const t = fmtTime(g.start_time);
            const icon = g.is_multi_slot ? (icons[g.artist_type] || '🎵') + ' ' : '';

    function fmtTime(t) { if (!t) return ''; const [h,m] = t.split(':').map(Number); return ((h%12)||12)+':'+String(m).padStart(2,'0')+(h>=12?'PM':'AM'); }
    function fmtDate(d) { if (!d) return ''; const [y,mo,dy] = d.split('-'); const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${months[parseInt(mo)-1]} ${parseInt(dy)}, ${y}`; }

    async function showGigDetail(date, idx) {
      const dayGigs = artistGigs.filter(g => g.date === date);
      const g = dayGigs[idx]; if (!g) return;
      const timeStr = fmtTime(g.start_time) + (g.end_time ? ' – ' + fmtTime(g.end_time) : '');
      const loc = [g.city, g.state].filter(Boolean).join(', ');
      const artType = g.artist_actual_type || g.artist_type || '';
      let formats = g.artist_band_formats || g.band_formats || '';
      if (formats) formats = formats.replace(/,/g, ', ');

      const isMultiSlot = g.is_multi_slot && g.total_slots_count > 0;
      const addr1 = g.address_line_1 || '';
      const addr2 = g.address_line_2 || '';
      let locHtml = '';
      if (addr1) locHtml += esc(addr1) + '<br>';
      if (addr2) locHtml += esc(addr2) + '<br>';
      if (g.city || g.state) locHtml += esc([g.city, g.state].filter(Boolean).join(', '));

      let rows = '';
      rows += modalRow('Date', fmtDate(g.date));
      if (!isMultiSlot) rows += modalRow('Time', timeStr || 'TBD');
      const venueLink = g.venue_id ? `<a href="/app/venue-profile.html?venue_id=${g.venue_id}" target="_blank">${esc(g.venue_name || '')}</a>` : esc(g.venue_name || '');
      rows += modalRowRaw('Venue', venueLink);
      if (locHtml) rows += modalRowRaw('Location', locHtml);
      if (!isMultiSlot) rows += modalRow('Artist', g.artist_name || artist?.name || '');
      if (artType) rows += modalRow('Artist Type', artType);
      if (artType === 'Live Band' && formats) rows += modalRow('Band Formats', formats);
      
      // For multi-slot gigs, fetch and display slot details
      if (isMultiSlot) {
        try {
          const slotsRes = await fetch(`/api/gigs/${g.id}/slots`);
          if (slotsRes.ok) {
            const slots = await slotsRes.json();
            slots.forEach(s => {
              const isBooked = s.status === 'booked';
              const color = isBooked ? '#ef4444' : '#22c55e';
              const bg = isBooked ? 'rgba(239,68,68,0.15)' : 'rgba(34,197,94,0.15)';
              const slotLabel = isBooked 
                ? (String(s.artist_id) === String(artistId)
                    ? `<span style="color:${color}; font-weight:600;">${esc(s.artist_name || 'Booked')}</span>`
                    : `<a href="/app/artist-profile.html?artist_id=${s.artist_id}" target="_blank" style="color:${color}; text-decoration:none; font-weight:600;">${esc(s.artist_name || 'Booked')}</a>`)
                : '<span style="color:#22c55e; font-weight:600;">Open</span>';
              rows += `<div style="display:flex; align-items:center; padding:9px 14px; margin-bottom:6px; background:${bg}; border:1px solid ${color}33; border-radius:6px; font-size:0.85rem; color:var(--text);">
                <span style="font-weight:700; min-width:56px;">Slot ${s.slot_number}</span>
                <span style="min-width:160px;">${fmtTime(s.start_time)} – ${fmtTime(s.end_time)}</span>
                <span style="margin-left:auto; text-align:right;">${slotLabel}</span>
              </div>`;
            });
          }
        } catch(e) { console.error('Error loading slots:', e); }
      }
      
      document.getElementById('gigModalBody').innerHTML = rows;
      // Only show flyer button for booked gigs
      const gigIsBooked = g.status === 'booked' || (g.is_multi_slot && g.booked_slots_count > 0);
      if (gigIsBooked) {
        fetch(`/api/gigs/${g.id}/flyer/public`).then(r=>r.json()).then(data=>{

          fd.style.cssText = 'margin-top:14px;text-align:center;';
          fd.innerHTML = `<button onclick="showFlyerModal(${g.id})" style="padding:8px 20px;border:1px solid rgba(139,92,246,0.4);border-radius:8px;background:rgba(139,92,246,0.15);color:#c4b5fd;cursor:pointer;font-size:0.85rem;font-weight:600;">🎨 View Event Flyer</button>`;

        }).catch(()=>{});
      }

    function _buildBuiltinFlyerJSON(gi) {
  var cW = 415, cH = 520;
  var s = cH / 1350;
  var W = cW * 0.94, L = cW * 0.03;
  var FONT = 'Trebuchet MS', GREY = 'rgba(200,200,210,0.9)';
  function ft(t) { if (!t) return ''; var pp = t.split(':').map(Number); return ((pp[0]%12)||12)+':'+String(pp[1]).padStart(2,'0')+(pp[0]>=12?'PM':'AM'); }
  var dStr = gi.date ? new Date(gi.date+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';
  var tStr = gi.start_time ? ft(gi.start_time)+(gi.end_time?' - '+ft(gi.end_time):'') : '';
  var loc  = [gi.address_line_1, gi.city&&gi.state?gi.city+', '+gi.state:(gi.city||gi.state)].filter(Boolean).join('\n');
  var R = Math.round;
  var objs = [
    // Dark overlay
    {type:'rect', left:0, top:0, width:cW, height:cH, fill:'rgba(0,0,0,0.45)', selectable:false, evented:false},
    // Venue name
    {type:'textbox', left:L, top:R(cH*0.03), width:W, text:(gi.venue_name||'VENUE NAME').toUpperCase(),
      fontSize:R(120*s), fontFamily:FONT, fontWeight:'bold', fill:'#ffffff', textAlign:'center',
      stroke:'#000000', strokeWidth:R(2*s), _tplVar:'venue_name'}
  ];
  if (loc) objs.push({type:'textbox', left:L, top:R(cH*0.225), width:W, text:loc,
    fontSize:R(45*s), fontFamily:FONT, fontWeight:'bold', fill:GREY, textAlign:'center', lineHeight:1.15, _tplVar:'location'});
  objs.push({type:'textbox', left:L, top:R(cH*0.355), width:W, text:'\u2605  L I V E   M U S I C  \u2605',
    fontSize:R(72*s), fontFamily:FONT, fontWeight:'bold', fill:GREY, textAlign:'center', charSpacing:100});
  if (dStr) objs.push({type:'textbox', left:L, top:R(cH*0.44), width:W, text:dStr,
    fontSize:R(80*s), fontFamily:FONT, fontWeight:'bold', fill:'#ffffff', textAlign:'center',
    stroke:'#000000', strokeWidth:R(3*s), _tplVar:'date'});
  if (tStr) objs.push({type:'textbox', left:L, top:R(cH*0.53), width:W, text:tStr,
    fontSize:R(65*s), fontFamily:FONT, fontWeight:'bold', fill:GREY, textAlign:'center', _tplVar:'time'});
  // Artist area — tagged artist_logo so the canvas renderer swaps in the real photo
  objs.push({type:'textbox', left:L, top:R(cH*0.50), width:W,
    text: gi.artist_picture_url ? '' : (gi.artist_name||'').toUpperCase(),
    fontSize:R(100*s), fontFamily:FONT, fontWeight:'bold', fill:'#ffffff', textAlign:'center',
    stroke:'#000000', strokeWidth:R(3*s), _tplVar:'artist_logo'});
  return JSON.stringify({version:'5.3.1', objects:objs, background:'#0a0a14', width:cW, height:cH});
}

        }

        function ft(t) { if (!t) return ''; var p = t.split(':').map(Number); return ((p[0]%12)||12)+':'+String(p[1]).padStart(2,'0')+(p[0]>=12?'PM':'AM'); }
        var dateStr = gi.date ? new Date(gi.date+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';
        var timeStr = gi.start_time ? ft(gi.start_time)+(gi.end_time?' - '+ft(gi.end_time):'') : '';
        var loc = [gi.address_line_1, gi.city&&gi.state?gi.city+', '+gi.state:(gi.city||gi.state)].filter(Boolean).join('\n');

        var tplVarByIdx = {};

      if (e.target.closest('.cal-gig')) return;
      const dayGigs = artistGigs.filter(g => g.date === ds);
      if (!dayGigs.length) return;

      await Promise.all(dayGigs.map(async g => {
        try {
          const r = await fetch(`/api/gigs/${g.id}/slots`);
          if (r.ok) g._daySlots = (await r.json()).sort((a,b) => (a.start_time||'').localeCompare(b.start_time||''));
        } catch(e) {}
      }));

      const [y, mo, d] = ds.split('-').map(Number);
      const dateStr = new Date(y, mo-1, d).toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
      const icons = {'Live Band':'🎸','DJ':'🎧','Comedian':'🎤','Trivia Host':'🧠'};

      let rows = dayGigs.map(g => {
        const isBooked = g.status === 'booked' || (g.is_multi_slot && g.booked_slots_count > 0);
        const gigBg    = isBooked ? 'linear-gradient(135deg,#ef4444,#b91c1c)' : 'linear-gradient(135deg,#10b981,#059669)';
        const gigBorder= isBooked ? '#b91c1c' : '#059669';
        const gigColor = isBooked ? '#ffffff' : '#000000';
        const icon = icons[g.artist_type] || '🎵';
        const time = fmtTime(g.start_time) + (g.end_time ? ' – ' + fmtTime(g.end_time) : '');
        const loc = [g.city, g.state].filter(Boolean).join(', ');
        let artistTypeDisplay = g.artist_type || 'Any';
        if (g.artist_type === 'Live Band' && g.band_formats)
          artistTypeDisplay += ' • ' + g.band_formats.split(',').map(f=>f.trim()).join(', ');
        const venueDisplay = g.venue_id
          ? `<a href="/app/venue-profile.html?venue_id=${g.venue_id}" target="_blank" onclick="event.stopPropagation()" style="color:${gigColor};text-decoration:underline;font-weight:600;">${esc(g.venue_name||'')}</a>`
          : esc(g.venue_name||'');

        let artistDisplay = '';
        if (!isBooked) {
          artistDisplay = `<span style="opacity:0.75;">OPEN</span>`;
        } else if (g._daySlots) {
          const bookedSlots = g._daySlots.filter(s => s.status === 'booked' && s.artist_name);
          artistDisplay = bookedSlots.length === 0
            ? '<span style="opacity:0.75;">Booked</span>'
            : bookedSlots.map(s => `<a href="/app/artist-profile.html?artist_id=${s.artist_id}" target="_blank" onclick="event.stopPropagation()" style="color:${gigColor};text-decoration:underline;font-weight:600;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">${esc(s.artist_name)}</a>`).join('<br>');
        } else if (g.artist_name) {
          artistDisplay = `<a href="/app/artist-profile.html?artist_id=${g.artist_id}" target="_blank" onclick="event.stopPropagation()" style="color:${gigColor};text-decoration:underline;font-weight:600;">${esc(g.artist_name)}</a>`;
        } else {
          artistDisplay = '<span style="opacity:0.75;">Booked</span>';
        }

        return `<div onclick="openDayGigDetail(${g.id},'${ds}')" style="display:grid;grid-template-columns:130px minmax(130px,1fr) minmax(120px,1fr) minmax(120px,1fr) minmax(150px,1.5fr);column-gap:12px;align-items:center;padding:6px 10px;margin:0;border:1px solid ${gigBorder};border-radius:6px;background:${gigBg};color:${gigColor};font-weight:700;white-space:nowrap;cursor:pointer;line-height:1.3;">
          <div>${icon} ${time}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;">${venueDisplay}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;">${esc(loc)}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;">${artistDisplay}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;">${esc(artistTypeDisplay)}</div>
        </div>`;
      }).join('');

      const modal = document.getElementById('gigModal');
      modal.querySelector('.gig-modal').classList.add('day-modal');
      modal.querySelector('h3').textContent = dateStr;
      document.getElementById('gigModalBody').innerHTML =
        `<div style="display:grid;grid-auto-rows:auto;row-gap:10px;width:100%;min-width:820px;font-size:0.7rem;">${rows}</div>`;
      modal.classList.remove('hidden');
    }

    function openDayGigDetail(gigId, ds) {
      const dayGigs = artistGigs.filter(g => g.date === ds);
      const idx = dayGigs.findIndex(g => g.id === gigId);
      if (idx >= 0) {
        document.getElementById('gigModal').querySelector('.gig-modal').classList.remove('day-modal');
        showGigDetail(ds, idx);
      }
    }

    // ========== MEDIA ==========
    function ytThumb(url) { const m = url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/); return m ? `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg` : "/app/static/img/video-placeholder.svg"; }
    async function loadMedia() {
      const res = await fetch(`/api/artists/${artistId}/media`, { credentials: "include" }); if (!res.ok) return;
      const media = await res.json();
      const pics = document.getElementById("pictures"), audio = document.getElementById("audio"), videos = document.getElementById("videos");
      media.forEach(m => {
        if (m.media_type === "logo" || m.media_type === "profile") document.getElementById("artistLogo").src = m.file_path;
        if (m.media_type === "picture") { const d = document.createElement("div"); d.className = "media-card"; d.innerHTML = `<img src="${escAttr(m.file_path)}"><div class="media-title-label">${esc(m.title||"")}</div>`; d.onclick = () => openModal(m.file_path, "image"); pics.appendChild(d); }
        if (m.media_type === "audio") { const d = document.createElement("div"); d.className = "audio-row"; d.innerHTML = `<strong>${esc((m.title||"").substring(0,50))}</strong><audio controls src="${escAttr(m.file_path)}"></audio>`; audio.appendChild(d); d.querySelector("audio").addEventListener("play", function(){ document.querySelectorAll("#audio audio").forEach(a => { if(a!==this) a.pause(); }); }); }
        if (m.media_type === "video") { const d = document.createElement("div"); d.className = "media-card"; d.innerHTML = `<img src="${escAttr(ytThumb(m.video_url))}"><div class="media-title-label">${esc(m.title||"")}</div>`; d.onclick = () => openModal(m.video_url, "video"); videos.appendChild(d); }
      });
      if (!pics.children.length) document.getElementById('picturesEmpty').style.display = 'block';
      if (!audio.children.length) document.getElementById('audioEmpty').style.display = 'block';
      if (!videos.children.length) document.getElementById('videosEmpty').style.display = 'block';
    }
    let lightboxSrc = '', lightboxType = '';
    function openModal(src, type) { lightboxSrc = src; lightboxType = type; const overlay = document.getElementById('lightboxOverlay'); const content = document.getElementById('lightboxContent'); if (type === 'image') { content.innerHTML = `<img src="${escAttr(src)}" style="max-width:90vw;max-height:90vh;border-radius:12px;">`; } else { const yt = src.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/); content.innerHTML = yt ? `<iframe width="800" height="450" src="https://www.youtube.com/embed/${escAttr(yt[1])}" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen style="border-radius:12px;"></iframe>` : `<video controls src="${escAttr(src)}" style="max-width:90vw;max-height:90vh;border-radius:12px;"></video>`; } overlay.style.display='flex'; }
    function closeModal() { document.getElementById('lightboxOverlay').style.display='none'; document.getElementById('lightboxContent').innerHTML = ''; }
    const _lbo = document.getElementById('lightboxOverlay'); if (_lbo) _lbo.addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escAttr(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  </script>
<script src="/app/static/js/artist-reviews.js"></script>
<script src="/app/static/js/gf-modals.js?v=6"></script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js",{scope:"/"}).catch(function(){});}</script>

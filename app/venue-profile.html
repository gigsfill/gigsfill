<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venue Profile – GigsFill</title>
  <meta name="description" content="View this venue's profile, upcoming live music events, amenities, and booking details on GigsFill.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/png" href="/app/static/img/gigsfill-logo_square.png">
  <link rel="manifest" href="/app/static/manifest.json">
  <link rel="apple-touch-icon" href="/app/static/img/gigsfill-logo_square.png">
  <meta name="theme-color" content="#0f1419">
  <meta property="og:type" content="profile">
  <meta property="og:title" content="Venue Profile – GigsFill">
  <meta property="og:description" content="View this venue's profile, upcoming live music events, and booking details on GigsFill.">
  <meta property="og:site_name" content="GigsFill">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Venue Profile – GigsFill">
  <meta name="twitter:description" content="View this venue's profile on GigsFill.">
  <link href="/app/static/css/gigsfill.css" rel="stylesheet">
  <link href="/app/static/css/mobile.css" rel="stylesheet">
  <style>
    :root { --card-padding: 16px 20px; --card-gap: 10px; --section-title-size: 0.7rem; }
    .profile-container { max-width: 1100px; margin: 0 auto; padding: 0 20px 20px; }

    /* LOGO HERO — always visible */
    .logo-hero { text-align: center; padding: 20px 20px 16px; }
    .profile-pic {
      width: 100%; max-width: 500px; height: 140px; object-fit: contain; background: var(--card, #111);
      border-radius: 8px; margin: 0 auto 12px; display: block; border: 2px solid var(--border);
    }
    .venue-name {
      font-size: 1.75rem; font-weight: 700; margin: 0 0 4px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .venue-address { font-size: 0.85rem; color: var(--text-gray); margin: 0; }

    /* TABS */
    .profile-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .profile-tabs button {
      flex-shrink: 0; padding: 10px 16px; background: none; border: none;
      border-bottom: 2px solid transparent; color: var(--text-gray);
      font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .profile-tabs button:hover { color: var(--text); }
    .profile-tabs button.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .content-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: var(--card-padding); margin-bottom: var(--card-gap);
    }
    .content-card > h2 {
      font-size: var(--section-title-size); font-weight: 700; color: var(--cyan);
      text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px;
      padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* Venue Info */
    .venue-bio { margin-top: 14px; font-size: 0.875rem; line-height: 1.6; color: var(--text); white-space: pre-line; }
    .venue-bio:empty { display: none; }
    .details-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .perks-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .detail-item {
      background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px; padding: 10px 12px;
    }
    .detail-item .label { font-size: 0.65rem; font-weight: 600; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .detail-item .value { font-size: 0.8rem; color: var(--text); font-weight: 500; }
    .detail-item .detail { font-size: 0.7rem; color: var(--text-gray); font-style: italic; margin-top: 4px; padding-left: 8px; border-left: 2px solid var(--border); }
    .detail-item.full-width { grid-column: span 2; }

    /* Calendar */
    .cal-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .cal-toolbar h3 { margin: 0; font-size: 1.3rem; color: var(--text); font-weight: 600; }
    .cal-toolbar button {
      background: transparent; border: 1px solid var(--border);
      color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s;
    }
    .cal-toolbar button:hover { background: rgba(255,255,255,0.05); border-color: var(--cyan); color: var(--cyan); }
    .cal-header {
      display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
      color: var(--text-gray); font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
    .cal-day {
      background: rgba(8, 11, 22, 0.97); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; min-height: 130px; padding: 8px 4px;
      cursor: pointer; position: relative; transition: all 0.2s;
      display: flex; flex-direction: column;
      width: 100%; min-width: 0; box-sizing: border-box; overflow: hidden;
    }
    .cal-day:hover { background: rgba(18, 22, 38, 0.98); border-color: rgba(124, 107, 255, 0.45); }
    .cal-day.empty { background: rgba(14, 17, 28, 0.6); border-color: rgba(255,255,255,0.04); cursor: default; }
    .cal-day .day-num { position: absolute; top: 8px; right: 10px; font-size: 0.75rem; color: rgba(255,255,255,0.55); font-weight: 500; margin-bottom: 0; }
    .cal-day.today { border-color: var(--cyan); }
    .cal-day.past { opacity: 0.5; background: rgba(0,0,0,0.2); cursor: default; }
    .cal-day.past:hover { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.08); }
    .cal-day.past .day-num { color: rgba(255,255,255,0.3); }
    /* Gig pills */
    .cal-gig {
      padding: 2px 8px; border-radius: 6px; margin-bottom: 4px;
      font-size: 0.65rem; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
      transition: all 0.2s; max-width: 100%;
    }
    .cal-gig:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .cal-gig.booked { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .cal-gig.open { background: linear-gradient(135deg, #10b981, #059669); color: #000 !important; }
    /* Scrollable gigs container */
    .cal-gigs-container {
      max-height: 100px; overflow-y: auto; overflow-x: hidden; margin-top: 26px; padding-right: 4px;
      scrollbar-width: thin; scrollbar-color: var(--accent-purple) rgba(0,0,0,0.2);
    }
    .cal-gigs-container::-webkit-scrollbar { width: 6px; }
    .cal-gigs-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
    .cal-gigs-container::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); border-radius: 3px; }
    .cal-gigs-container .cal-gig { margin-top: 0; }
    .cal-gigs-container .cal-gig:last-child { margin-bottom: 0; }

    /* Gig Detail Modal */
    .gig-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; z-index: 10000;
    }
    .gig-modal-overlay.hidden { display: none; }
    .gig-modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 28px 32px; max-width: 480px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      max-height: 90vh; overflow-y: auto;
    }
    .gig-modal.day-modal {
      max-width: min(980px, 96vw);
      width: fit-content;
      min-width: min(900px, 96vw);
      padding: 24px;
    }
    .gig-modal.day-modal .gig-row {
      font-size: 0.7rem;
      font-weight: 700;
    }
    .gig-modal.day-modal h3 {
      margin: 0 0 18px; font-size: 1rem; font-weight: 700; color: var(--text);
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .gig-modal-row {
      display: flex; justify-content: space-between; padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .gig-modal-row:last-of-type { border-bottom: none; }
    .gig-modal-label { font-size: 0.75rem; color: var(--text-gray); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .gig-modal-value { font-size: 0.8rem; color: var(--text); font-weight: 500; text-align: right; }
    .gig-modal-close {
      margin-top: 18px; width: 100%; padding: 10px; background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text-gray);
      font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .gig-modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .gig-modal-value a { color: var(--cyan); text-decoration: none; }
    .gig-modal-value a:hover { text-decoration: underline; }
    .cal-legend {
      display: flex; gap: 16px; justify-content: center; margin-top: 10px; font-size: 0.7rem;
    }
    .cal-legend span { display: flex; align-items: center; gap: 5px; color: var(--text-gray); }
    .cal-legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
    .cal-legend-dot.open { background: #10b981; }
    .cal-legend-dot.booked { background: #ef4444; }

    /* Social Media */
    .social-links { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    .social-link {
      display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-gray); text-decoration: none;
      font-size: 1rem; font-weight: 600; transition: all 0.2s;
    }
    .social-link span:first-child { font-size: 1.3rem; }
    .social-link:hover { background: rgba(139,92,246,0.15); border-color: var(--purple); color: var(--purple); transform: translateX(3px); }

    /* Media */
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .media-card {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.2s;
    }
    .media-card:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
    .media-card img { width: 100%; height: 80px; object-fit: cover; display: block; }
    .media-title-label {
      padding: 6px 8px; font-size: 0.65rem; color: var(--text-gray);
      text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: rgba(0,0,0,0.3);
    }
    .empty-msg { color: var(--text-gray); font-size: 0.82rem; text-align: center; padding: 24px 0; }

    /* Media Modal */
    #mediaModal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer; }
    #mediaModal.hidden { display: none; }
    #mediaModalContent img, #mediaModalContent video { max-width: 90vw; max-height: 90vh; border-radius: 10px; }
    #mediaModalContent iframe { border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }

    @media (max-width: 600px) {
      .profile-pic { height: 100px; }
      .venue-name { font-size: 1.4rem; }
      .details-row, .perks-grid { grid-template-columns: 1fr; }
      .detail-item.full-width { grid-column: span 1; }
      .media-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .cal-gig { font-size: 0.55rem; }
      .cal-day { min-height: 90px; padding: 6px; }
      .cal-gigs-container { margin-top: 20px; max-height: 70px; }
      .gig-modal { padding: 20px 24px; }
      .profile-tabs button { padding: 8px 10px; font-size: 0.7rem; }
    }
  </style>
  <script src="/app/static/js/security.js"></script>
  <script src="/app/static/js/time-format.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="logo"><img src="/app/static/img/gigsfill-logo.png" alt="GigsFill" style="height:44px;width:auto;flex-shrink:0;"></div>
      <div class="header-actions"><a class="btn ghost" href="/app/index.html">Home</a></div>
    </div>
  </header>

  <main class="profile-container">
    <div class="logo-hero">
      <img id="venueLogo" class="profile-pic" src="/app/static/img/profile-placeholder.svg" alt="Venue photo"
        onerror="this.onerror=null;this.src='/app/static/img/profile-placeholder.svg';">
      <h1 class="venue-name" id="venueName">Venue</h1>
      <div class="venue-address" id="venueAddress"></div>
      <div id="venueAboutHeader" style="font-size:0.88rem;color:var(--text-gray);margin:6px auto 0;max-width:560px;line-height:1.5;font-style:italic;"></div>
    </div>

    <div class="profile-tabs">
      <button id="tabBtnInfo" onclick="switchTab('info')" style="display:none;">Venue Info</button>
      <button id="tabBtnCalendar" class="active" onclick="switchTab('calendar')">Calendar</button>
      <button id="tabBtnVideos" onclick="switchTab('videos')">Videos</button>
      <button id="tabBtnPictures" onclick="switchTab('pictures')">Pictures</button>
      <button id="tabBtnSocial" onclick="switchTab('social')">Social Media</button>
      <button id="tabBtnReviews" onclick="switchTab('reviews')">Reviews <span id="reviewsBadge" style="font-size:0.7rem;color:var(--text-muted);"></span></button>
    </div>

    <!-- VENUE INFO TAB -->
    <div class="tab-panel" id="tab-info">
      <div class="content-card">
        <h2>About</h2>
        <div class="venue-bio" id="venueBio"></div>
      </div>
      <div class="content-card">
        <h2>Venue Details</h2>
        <div class="details-row" id="venueDetails"></div>
      </div>
      <div class="content-card">
        <h2>Venue Perks</h2>
        <div class="perks-grid" id="venuePerks"></div>
      </div>
      <div class="content-card" id="proCertSection" style="display: none;">
        <h2>Public Performance Licensing</h2>
        <p id="proCertText" style="font-size: 0.8rem; color: var(--text-gray); line-height: 1.7; font-style: italic;"></p>
      </div>
    </div>

    <!-- CALENDAR TAB -->
    <div class="tab-panel active" id="tab-calendar">
      <div class="content-card">
        <div class="cal-toolbar">
          <button onclick="changeMonth(-1)">◀ Prev</button>
          <h3 id="calMonth"></h3>
          <button onclick="changeMonth(1)">Next ▶</button>
        </div>
        <div class="cal-header"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend">
          <span><span class="cal-legend-dot open"></span> Open</span>
          <span><span class="cal-legend-dot booked"></span> Booked</span>
        </div>
      </div>
    </div>

    <!-- VIDEOS TAB -->
    <div class="tab-panel" id="tab-videos">
      <div class="content-card"><div class="media-grid" id="videos"></div><div class="empty-msg" id="videosEmpty" style="display:none;">No videos uploaded yet.</div></div>
    </div>
    <!-- PICTURES TAB -->
    <div class="tab-panel" id="tab-pictures">
      <div class="content-card"><div class="media-grid" id="pictures"></div><div class="empty-msg" id="picturesEmpty" style="display:none;">No pictures uploaded yet.</div></div>
    </div>
    <!-- SOCIAL MEDIA TAB -->
    <div class="tab-panel" id="tab-social">
      <div class="content-card"><div class="social-links" id="socialMedia"></div><div class="empty-msg" id="socialEmpty" style="display:none;">No social media links added yet.</div></div>
    </div>
    <!-- REVIEWS TAB -->
    <div class="tab-panel" id="tab-reviews">
      <div class="content-card">
        <div id="venueRatingSummaryContainer" style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);"></div>
        <div id="venueReviewsListContainer"></div>
      </div>
    </div>
  </main>

  <div class="hidden" id="mediaModal"><div id="mediaModalContent"></div></div>
  <div class="gig-modal-overlay hidden" id="gigModal">
    <div class="gig-modal">
      <h3>Gig Details</h3>
      <div id="gigModalBody"></div>
      <div class="modal-actions" style="margin-top:16px;display:flex;justify-content:flex-end;"><button class="btn ghost" onclick="closeGigModal()">Close</button></div>
    </div>
  </div>

  <script>
    const TAB_NAMES = ['info','calendar','videos','pictures','social','reviews'];
    function switchTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.profile-tabs button').forEach(b => b.classList.remove('active'));
      const panel = document.getElementById('tab-' + name);
      if (panel) panel.classList.add('active');
      const btn = document.getElementById('tabBtn' + name.charAt(0).toUpperCase() + name.slice(1));
      if (btn) btn.classList.add('active');
      if (name === 'reviews' && !window._venueReviewsLoaded) {
        window._venueReviewsLoaded = true;
        renderVenueRatingSummary('venueRatingSummaryContainer', venueId);
        renderVenueReviews('venueReviewsListContainer', venueId);
      }
    }

    let venueData = null, venueGigs = [], calYear, calMonth;
    let venueId = new URLSearchParams(window.location.search).get("venue_id");

    (async function loadVenue() {
      if (!venueId) { document.querySelector('.profile-container').innerHTML = '<p style="text-align:center;color:var(--text-gray);padding:40px;">Missing venue_id parameter.</p>'; return; }

      const res = await fetch(`/api/venues/${venueId}/public`, { credentials: "include" });
      if (!res.ok) { document.querySelector('.profile-container').innerHTML = '<p style="text-align:center;color:var(--text-gray);padding:40px;">Venue not found.</p>'; return; }
      venueData = await res.json();

      // Hero
      document.getElementById("venueName").textContent = venueData.venue_name || "";
      const addr = [venueData.address_line_1, venueData.address_line_2, venueData.city, venueData.state, venueData.postal_code].filter(Boolean);
      document.getElementById("venueAddress").textContent = addr.join(", ");
      document.title = (venueData.venue_name || "Venue") + " – GigsFill";
      // Dynamic SEO updates
      const seoDesc = `${venueData.venue_name || 'Venue'}${venueData.city ? ' in ' + venueData.city + ', ' + venueData.state : ''} – live music venue on GigsFill. View upcoming events, amenities, and booking info.`;
      document.querySelector('meta[name="description"]')?.setAttribute('content', seoDesc);
      document.querySelector('meta[property="og:title"]')?.setAttribute('content', document.title);
      document.querySelector('meta[property="og:description"]')?.setAttribute('content', seoDesc);
      document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', document.title);
      document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', seoDesc);

      // Bio
      document.getElementById("venueBio").textContent = (venueData.description || "").trim();
      // Show about in header
      const _aboutEl = document.getElementById("venueAboutHeader");
      if (_aboutEl && venueData.description) _aboutEl.textContent = venueData.description.trim();
      // Show Venue Info tab only to logged-in artists
      try {
        const _meRes = await fetch('/api/me', { credentials: 'include' });
        if (_meRes.ok) {
          const _me = await _meRes.json();
          if (_me.artists && _me.artists.length > 0) {
            const _infoBtn = document.getElementById('tabBtnInfo');
            if (_infoBtn) _infoBtn.style.display = '';
          }
        }
      } catch(_e) {}

      // Details
      const dh = [];
      dh.push(`<div class="detail-item"><div class="label">Capacity</div><div class="value">${venueData.venue_size || "No Info Provided"}</div></div>`);
      let freq = "No Limit";
      if (venueData.artist_frequency_days && venueData.artist_frequency_days > 0) freq = `1 performance every ${venueData.artist_frequency_days} days`;
      dh.push(`<div class="detail-item"><div class="label">Artist Frequency</div><div class="value">${freq}</div></div>`);
      let pay = "No Info Provided";
      if (venueData.default_pay_dollars !== null && venueData.default_pay_dollars !== undefined) {
        pay = `$${venueData.default_pay_dollars || 0}.${String(venueData.default_pay_cents || 0).padStart(2, "0")}`;
      }
      dh.push(`<div class="detail-item"><div class="label">Default Pay</div><div class="value">${pay}</div></div>`);
      let arrival = "Flexible";
      if (venueData.arrival_time_type === "no_earlier_than" && venueData.arrival_no_earlier_than_hour) {
        arrival = `No earlier than ${venueData.arrival_no_earlier_than_hour} ${venueData.arrival_no_earlier_than_period || ""}`;
      }
      const loadIn = venueData.load_in_out_details || "No Info Provided";
      dh.push(`<div class="detail-item"><div class="label">Arrival</div><div class="value">${arrival}<div class="detail">${loadIn}</div></div></div>`);
      document.getElementById("venueDetails").innerHTML = dh.join("");

      // Perks
      const ph = [];
      ph.push(`<div class="detail-item"><div class="label">Bar Tab</div><div class="value">${venueData.bar_tab_details || "No Info Provided"}</div></div>`);
      ph.push(`<div class="detail-item"><div class="label">Food Tab</div><div class="value">${venueData.food_tab_details || "No Info Provided"}</div></div>`);
      let stage = "No";
      if (venueData.has_stage) { stage = "Yes"; const dims = []; if (venueData.stage_width_ft) dims.push(`${venueData.stage_width_ft}' wide`); if (venueData.stage_depth_ft) dims.push(`${venueData.stage_depth_ft}' deep`); if (dims.length) stage += ` (${dims.join(" × ")})`; }
      ph.push(`<div class="detail-item"><div class="label">Stage</div><div class="value">${stage}${venueData.has_stage && venueData.setup_location_description ? `<div class="detail">${venueData.setup_location_description}</div>` : ""}</div></div>`);
      ph.push(`<div class="detail-item"><div class="label">Sound Equipment</div><div class="value">${venueData.has_sound_equipment ? "Yes" : "No"}${venueData.has_sound_equipment && venueData.sound_equipment_description ? `<div class="detail">${venueData.sound_equipment_description}</div>` : ""}</div></div>`);
      ph.push(`<div class="detail-item"><div class="label">Lighting</div><div class="value">${venueData.has_lighting ? "Yes" : "No"}${venueData.has_lighting && venueData.lighting_description ? `<div class="detail">${venueData.lighting_description}</div>` : ""}</div></div>`);
      ph.push(`<div class="detail-item"><div class="label">Sound Engineer</div><div class="value">${venueData.has_sound_engineer ? "Yes" : "No"}${venueData.has_sound_engineer && venueData.sound_engineer_details ? `<div class="detail">${venueData.sound_engineer_details}</div>` : ""}</div></div>`);
      document.getElementById("venuePerks").innerHTML = ph.join("");

      // PRO Certification
      if (venueData.pro_certified) {
        const vn = venueData.venue_name || 'This venue';
        document.getElementById("proCertText").textContent = `${vn} represents and warrants that this venue maintains active public performance licenses from all applicable Performing Rights Organizations ("PROs"), including but not limited to ASCAP, BMI, SESAC, GMR, and any other organization required for the lawful public performance of musical works at this venue. ${vn} understands that maintaining such licenses is solely the responsibility of the venue.`;
        document.getElementById("proCertSection").style.display = "";
      }

      // Social
      const ensureProto = u => { if (!u) return ''; const t = u.trim(); return (t.startsWith('http://') || t.startsWith('https://')) ? t : 'https://' + t; };
      const links = [
        { url: venueData.website_url, label: "Website", icon: "🌐" },
        { url: venueData.facebook_url, label: "Facebook", icon: "👥" },
        { url: venueData.instagram_url, label: "Instagram", icon: "📷" },
        { url: venueData.twitter_url, label: "Twitter/X", icon: "🐦" },
        { url: venueData.yelp_url, label: "Yelp", icon: "⭐" },
        { url: venueData.google_maps_url, label: "Google Maps", icon: "📍" }
      ].filter(l => l.url && l.url.trim());
      if (links.length > 0) {
        document.getElementById("socialMedia").innerHTML = links.map(l => `<a href="${ensureProto(l.url)}" target="_blank" rel="noopener noreferrer" class="social-link"><span>${l.icon}</span><span>${l.label}</span></a>`).join('');
      } else { document.getElementById("socialEmpty").style.display = "block"; }

      document.getElementById("venueLogo").src = "/app/static/img/profile-placeholder.svg";
      loadMedia();
      loadGigs();
    })();

    // ========== CALENDAR ==========
    async function loadGigs() {
      try { const r = await fetch(`/venues/${venueId}/gigs`); if (r.ok) venueGigs = await r.json(); } catch(e) {}
      const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth();
      renderCalendar();
    }
    function changeMonth(d) { calMonth += d; if (calMonth > 11) { calMonth = 0; calYear++; } if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
    function renderCalendar() {
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('calMonth').textContent = `${months[calMonth]} ${calYear}`;
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const _now = new Date();
      const todayStr = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
      const icons = { 'Live Band': '🎸', 'DJ': '🎧', 'Comedian': '🎤', 'Trivia Host': '🧠' };
      let html = '';
      for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = ds === todayStr;
        const isPast = ds < todayStr;
        const dayGigs = venueGigs.filter(g => g.date === ds);
        const dayClickAttr = (!isPast && dayGigs.length > 0) ? ` onclick="openDayGigsModal(event,'${ds}')"` : '';
        html += `<div class="cal-day${isToday ? ' today' : ''}${isPast ? ' past' : ''}"${dayClickAttr}><div class="day-num">${d}</div>`;
        if (dayGigs.length > 0) {
          html += '<div class="cal-gigs-container">';
          let gigIdx = 0;
          dayGigs.forEach((g) => {
            if (g.is_multi_slot && g.slots && g.slots.length > 0) {
              // Expand multi-slot gigs into individual slot bubbles
              g.slots.slice().sort((a,b) => (a.start_time||'').localeCompare(b.start_time||'')).forEach((slot) => {
                const isBooked = slot.status === 'booked';
                const cls = isBooked ? 'booked' : 'open';
                const t = fmtTime(slot.start_time);
                const icon = (icons[g.artist_type] || '🎵') + ' ';
                const label = isBooked ? `${icon}${t} · ${slot.artist_name || 'Booked'}` : `${icon}${t} · Open`;
                html += `<div class="cal-gig ${cls}" onclick="showGigDetail('${ds}',${gigIdx})" title="${esc(label)}">${esc(label)}</div>`;
              });
            } else {
              // Single gig or non-multi-slot
              const cls = g.status === 'booked' ? 'booked' : 'open';
              const t = fmtTime(g.start_time);
              const icon = g.is_multi_slot ? (icons[g.artist_type] || '🎵') + ' ' : '';
              const label = g.status === 'booked' && g.artist_name ? `${icon}${t} · ${g.artist_name}` : `${icon}${t} · ${g.title || 'Open'}`;
              html += `<div class="cal-gig ${cls}" onclick="showGigDetail('${ds}',${gigIdx})" title="${esc(label)}">${esc(label)}</div>`;
            }
            gigIdx++;
          });
          html += '</div>';
        }
        html += '</div>';
      }
      document.getElementById('calGrid').innerHTML = html;
    }
    function fmtTime(t) { if (!t) return ''; const [h,m] = t.split(':').map(Number); return ((h%12)||12)+':'+String(m).padStart(2,'0')+(h>=12?'PM':'AM'); }
    function fmtDate(d) { if (!d) return ''; const [y,mo,dy] = d.split('-'); const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${months[parseInt(mo)-1]} ${parseInt(dy)}, ${y}`; }

    async function showGigDetail(date, idx) {
      const dayGigs = venueGigs.filter(g => g.date === date);
      const g = dayGigs[idx]; if (!g) return;
      const timeStr = fmtTime(g.start_time) + (g.end_time ? ' – ' + fmtTime(g.end_time) : '');
      const loc = [venueData?.city, venueData?.state].filter(Boolean).join(', ');
      const artType = g.artist_actual_type || g.artist_type || '';
      let formats = g.artist_band_formats || g.band_formats || '';
      if (formats) formats = formats.replace(/,/g, ', ');

      const isMultiSlot = g.is_multi_slot && g.total_slots_count > 0;
      const addr1 = venueData?.address_line_1 || '';
      const addr2 = venueData?.address_line_2 || '';
      const city = venueData?.city || '';
      const state = venueData?.state || '';
      let locHtml = '';
      if (addr1) locHtml += esc(addr1) + '<br>';
      if (addr2) locHtml += esc(addr2) + '<br>';
      if (city || state) locHtml += esc([city, state].filter(Boolean).join(', '));

      let rows = '';
      rows += modalRow('Date', fmtDate(g.date));
      if (!isMultiSlot) rows += modalRow('Time', timeStr || 'TBD');
      rows += modalRow('Venue', g.venue_name || venueData?.venue_name || '');
      if (locHtml) rows += modalRowRaw('Location', locHtml);
      if (!isMultiSlot && g.status === 'booked' && g.artist_name) {
        const artistLink = g.artist_id ? `<a href="/app/artist-profile.html?artist_id=${g.artist_id}" target="_blank">${esc(g.artist_name)}</a>` : esc(g.artist_name);
        rows += modalRowRaw('Artist', artistLink);
      }
      if (!isMultiSlot && g.status === 'open') rows += modalRow('Status', 'Open – Looking for artist');
      if (artType) rows += modalRow('Artist Type', artType);
      if (artType === 'Live Band' && formats) rows += modalRow('Band Formats', formats);
      
      // For multi-slot gigs, fetch and display slot details
      if (isMultiSlot) {
        try {
          const slotsRes = await fetch(`/api/gigs/${g.id}/slots`);
          if (slotsRes.ok) {
            const slots = await slotsRes.json();
            slots.forEach(s => {
              const isBooked = s.status === 'booked';
              const color = isBooked ? '#ef4444' : '#22c55e';
              const bg = isBooked ? 'rgba(239,68,68,0.15)' : 'rgba(34,197,94,0.15)';
              const slotLabel = isBooked 
                ? `<a href="/app/artist-profile.html?artist_id=${s.artist_id}" target="_blank" style="color:${color}; text-decoration:none; font-weight:600;">${esc(s.artist_name || 'Booked')}</a>`
                : '<span style="color:#22c55e; font-weight:600;">Open</span>';
              rows += `<div style="display:flex; align-items:center; padding:9px 14px; margin-bottom:6px; background:${bg}; border:1px solid ${color}33; border-radius:6px; font-size:0.85rem; color:var(--text);">
                <span style="font-weight:700; min-width:56px;">Slot ${s.slot_number}</span>
                <span style="min-width:160px;">${fmtTime(s.start_time)} – ${fmtTime(s.end_time)}</span>
                <span style="margin-left:auto; text-align:right;">${slotLabel}</span>
              </div>`;
            });
          }
        } catch(e) { console.error('Error loading slots:', e); }
      }

      document.getElementById('gigModalBody').innerHTML = rows;
      // Only show flyer button for booked gigs
      const gigIsBooked = g.status === 'booked' || (g.is_multi_slot && g.booked_slots_count > 0);
      if (gigIsBooked) {
        fetch(`/api/gigs/${g.id}/flyer/public`).then(r=>r.json()).then(data=>{
          if (!data.exists) return;
          const fd = document.createElement('div');
          fd.style.cssText = 'margin-top:14px;text-align:center;';
          fd.innerHTML = `<button onclick="showFlyerModal(${g.id})" style="padding:8px 20px;border:1px solid rgba(139,92,246,0.4);border-radius:8px;background:rgba(139,92,246,0.15);color:#c4b5fd;cursor:pointer;font-size:0.85rem;font-weight:600;">🎨 View Event Flyer</button>`;
          document.getElementById('gigModalBody').appendChild(fd);
          window._flyerCache = window._flyerCache || {};
          window._flyerCache[g.id] = data;
        }).catch(()=>{});
      }
      document.getElementById('gigModal').classList.remove('hidden');
    }
    function modalRow(label, value) { return `<div class="gig-modal-row"><span class="gig-modal-label">${label}</span><span class="gig-modal-value">${esc(value)}</span></div>`; }
    function modalRowRaw(label, html) { return `<div class="gig-modal-row"><span class="gig-modal-label">${label}</span><span class="gig-modal-value">${html}</span></div>`; }
                function showFlyerModal(gigId) {
      _showFlyerOverlay((window._flyerCache||{})[gigId], 'flyerFullModal');
    }

    function _buildBuiltinFlyerJSON(gi) {
  var cW = 415, cH = 520;
  var s = cH / 1350;
  var W = cW * 0.94, L = cW * 0.03;
  var FONT = 'Trebuchet MS', GREY = 'rgba(200,200,210,0.9)';
  function ft(t) { if (!t) return ''; var pp = t.split(':').map(Number); return ((pp[0]%12)||12)+':'+String(pp[1]).padStart(2,'0')+(pp[0]>=12?'PM':'AM'); }
  var dStr = gi.date ? new Date(gi.date+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';
  var tStr = gi.start_time ? ft(gi.start_time)+(gi.end_time?' - '+ft(gi.end_time):'') : '';
  var loc  = [gi.address_line_1, gi.city&&gi.state?gi.city+', '+gi.state:(gi.city||gi.state)].filter(Boolean).join('\n');
  var R = Math.round;
  var objs = [
    // Dark overlay
    {type:'rect', left:0, top:0, width:cW, height:cH, fill:'rgba(0,0,0,0.45)', selectable:false, evented:false},
    // Venue name
    {type:'textbox', left:L, top:R(cH*0.03), width:W, text:(gi.venue_name||'VENUE NAME').toUpperCase(),
      fontSize:R(120*s), fontFamily:FONT, fontWeight:'bold', fill:'#ffffff', textAlign:'center',
      stroke:'#000000', strokeWidth:R(2*s), _tplVar:'venue_name'}
  ];
  if (loc) objs.push({type:'textbox', left:L, top:R(cH*0.225), width:W, text:loc,
    fontSize:R(45*s), fontFamily:FONT, fontWeight:'bold', fill:GREY, textAlign:'center', lineHeight:1.15, _tplVar:'location'});
  objs.push({type:'textbox', left:L, top:R(cH*0.355), width:W, text:'\u2605  L I V E   M U S I C  \u2605',
    fontSize:R(72*s), fontFamily:FONT, fontWeight:'bold', fill:GREY, textAlign:'center', charSpacing:100});
  if (dStr) objs.push({type:'textbox', left:L, top:R(cH*0.44), width:W, text:dStr,
    fontSize:R(80*s), fontFamily:FONT, fontWeight:'bold', fill:'#ffffff', textAlign:'center',
    stroke:'#000000', strokeWidth:R(3*s), _tplVar:'date'});
  if (tStr) objs.push({type:'textbox', left:L, top:R(cH*0.53), width:W, text:tStr,
    fontSize:R(65*s), fontFamily:FONT, fontWeight:'bold', fill:GREY, textAlign:'center', _tplVar:'time'});
  // Artist area — tagged artist_logo so the canvas renderer swaps in the real photo
  objs.push({type:'textbox', left:L, top:R(cH*0.50), width:W,
    text: gi.artist_picture_url ? '' : (gi.artist_name||'').toUpperCase(),
    fontSize:R(100*s), fontFamily:FONT, fontWeight:'bold', fill:'#ffffff', textAlign:'center',
    stroke:'#000000', strokeWidth:R(3*s), _tplVar:'artist_logo'});
  return JSON.stringify({version:'5.3.1', objects:objs, background:'#0a0a14', width:cW, height:cH});
}

    function _showFlyerOverlay(data, modalId) {
  var fm = document.getElementById(modalId);
  if (!fm) {
    fm = document.createElement('div');
    fm.id = modalId;
    fm.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:99999;align-items:center;justify-content:center;cursor:pointer;padding:20px;box-sizing:border-box;';
    fm.onclick = function(e) { if (e.target === fm) fm.style.display = 'none'; };
    document.body.appendChild(fm);
  }
  fm.style.display = 'flex';
  var mid = modalId;
  var closeBtn = '<button onclick="document.getElementById(\''+mid+'\').style.display=\'none\'" style="padding:9px 22px;background:rgba(255,255,255,0.08);color:#e2e8f0;border:1px solid rgba(255,255,255,0.2);border-radius:8px;font-size:0.85rem;font-weight:500;cursor:pointer;">&#10005; Close</button>';

  // Build descriptive filename from gig_info
  var gi0 = (data && data.gig_info) || {};
  // Hoist artist name from slots if not on root (multi-slot gigs)
  if (!gi0.artist_name && gi0.slots && gi0.slots.length) {
    var s0 = gi0.slots.find(function(s){return s.artist_name;}) || gi0.slots[0];
    if (s0) gi0.artist_name = s0.artist_name;
  }
  var _gigFileName = (function() {
    var v = (gi0.venue_name||'').replace(/[^a-zA-Z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
    var d = gi0.date ? (function(){ var dt=new Date(gi0.date+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).replace(/[\s,]+/g,'_'); })() : '';
    function _ft(t){if(!t)return'';var p=t.split(':').map(Number);return((p[0]%12)||12)+'_'+String(p[1]).padStart(2,'0')+(p[0]>=12?'PM':'AM');}
    var t = gi0.start_time ? _ft(gi0.start_time)+(gi0.end_time?'-'+_ft(gi0.end_time):'') : '';
    var a = (gi0.artist_name||'').replace(/[^a-zA-Z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
    return [v,d,t,a].filter(Boolean).join('_') || (data&&data.name) || 'event-flyer';
  })();


  if (data && data.thumbnail_data) {
    fm.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:12px;" onclick="event.stopPropagation()"><img src="' + data.thumbnail_data + '" style="max-height:520px;max-width:88vw;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.6);object-fit:contain;"><div style="display:flex;gap:12px;"><a href="' + data.thumbnail_data + '" download="' + _gigFileName + '.jpg" style="padding:9px 22px;background:rgba(139,92,246,0.85);color:#fff;border:1px solid rgba(139,92,246,0.6);border-radius:8px;font-size:0.85rem;font-weight:600;text-decoration:none;cursor:pointer;">&#11015; Download Flyer</a>' + closeBtn + '</div></div>';
    return;
  }

  if (data && data.canvas_data) {
    // Container for spinner — Fabric will place its wrapper div inside _pfMount
    fm.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:12px;" onclick="event.stopPropagation()"><div id="_pfMount" style="position:relative;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6);"><canvas id="_pfCanvas"></canvas><div id="_pfSpinner" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,10,20,0.9);"><span style="color:#c4b5fd;font-size:1rem;">Loading flyer...</span></div></div><div id="_pfBtnRow" style="display:flex;gap:12px;"><span id="_pfDlPlaceholder"></span>' + closeBtn + '</div></div>';

    function doRender() {
      try {
        var parsed = typeof data.canvas_data === 'string' ? JSON.parse(data.canvas_data) : data.canvas_data;

        // canvas JSON width/height ARE the display dimensions (e.g. 415x520 for instagram_post)
        var canvasW = parsed.width  || 415;
        var canvasH = parsed.height || 520;

        // Display at fixed 520px height (matching editor CANVAS_DISPLAY_HEIGHT),
        // preserving aspect ratio — same size regardless of thumbnail vs canvas path
        var aspect = canvasW / canvasH;
        var displayH = Math.min(520, Math.floor(window.innerHeight * 0.80));
        var displayW = Math.round(displayH * aspect);
        // If too wide, constrain to viewport width
        var maxW = Math.floor(window.innerWidth * 0.88);
        if (displayW > maxW) { displayW = maxW; displayH = Math.round(displayW / aspect); }

        var mount = document.getElementById('_pfMount');
        if (!mount) return;
        mount.style.width  = displayW + 'px';
        mount.style.height = displayH + 'px';

        // Create Fabric canvas at exact display size — no transforms needed
        var fc = new fabric.StaticCanvas('_pfCanvas', {
          width: displayW, height: displayH, renderOnAddRemove: false
        });

        // Gig info
        var gi = data.gig_info || {};
        if (!gi.artist_picture_url && gi.slots && gi.slots.length) {
          var sl = gi.slots.find(function(s) { return s.artist_id; }) || gi.slots[0];
          if (sl) { gi.artist_id = gi.artist_id || sl.artist_id; gi.artist_name = gi.artist_name || sl.artist_name; gi.artist_picture_url = gi.artist_picture_url || sl.artist_picture_url; }
        }

        function ft(t) { if (!t) return ''; var p = t.split(':').map(Number); return ((p[0]%12)||12)+':'+String(p[1]).padStart(2,'0')+(p[0]>=12?'PM':'AM'); }
        var dateStr = gi.date ? new Date(gi.date+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';
        var timeStr = gi.start_time ? ft(gi.start_time)+(gi.end_time?' - '+ft(gi.end_time):'') : '';
        var loc = [gi.address_line_1, gi.city&&gi.state?gi.city+', '+gi.state:(gi.city||gi.state)].filter(Boolean).join('\n');

        // Use src->_tplVar map + reviver for reliable custom prop restoration
        var tplVarByIdx = {};
        var tplVarBySrc = {};
        (parsed.objects || []).forEach(function(o, i) {
          if (o._tplVar) { tplVarByIdx[i] = o._tplVar; if (o.src) tplVarBySrc[o.src] = o._tplVar; }
        });
        var reviver = function(jsonObj, fabricObj) {
          var tv = (jsonObj.src && tplVarBySrc[jsonObj.src]) || jsonObj._tplVar;
          if (tv) fabricObj._tplVar = tv;
          if (jsonObj._isZoneRect) fabricObj._isZoneRect = true;
        };

        fc.loadFromJSON(parsed, function() {
          var objs = fc.getObjects();
          objs.forEach(function(obj, i) { if (!obj._tplVar && tplVarByIdx[i]) obj._tplVar = tplVarByIdx[i]; });

          // Update text vars
          objs.forEach(function(obj) {
            var v = obj._tplVar;
            if (!v || obj.text === undefined) return;
            if      (v==='date'        && dateStr)       obj.set('text', dateStr);
            else if (v==='time'        && timeStr)       obj.set('text', timeStr);
            else if (v==='venue_name'  && gi.venue_name) obj.set('text', gi.venue_name.toUpperCase());
            else if (v==='location'    && loc)           obj.set('text', loc);
            else if (v==='artist_name' && gi.artist_name) obj.set('text', gi.artist_name.toUpperCase());
          });

          function finish() {
            fc.renderAll();
            var sp = document.getElementById('_pfSpinner'); if (sp) sp.style.display='none';
            var dlPh = document.getElementById('_pfDlPlaceholder');
            if (dlPh) {
              var dlUrl = fc.toDataURL({format:'jpeg', quality:0.92, multiplier: Math.round(Math.min(1400/canvasW, 2))});
              dlPh.outerHTML = '<a href="' + dlUrl + '" download="' + _gigFileName + '.jpg" style="padding:9px 22px;background:rgba(139,92,246,0.85);color:#fff;border:1px solid rgba(139,92,246,0.6);border-radius:8px;font-size:0.85rem;font-weight:600;text-decoration:none;cursor:pointer;">&#11015; Download Flyer</a>';
            }
          }

          // Count pending async image loads — call finish() only when all are done
          var pending = 0;
          function maybeFinish() { if (--pending <= 0) finish(); }

          // ── Venue Logo ──
          var vLogoImage = objs.find(function(o) { return o._tplVar==='venue_logo' && o.type==='image'; });
          var vLogoZone  = objs.find(function(o) { return o._tplVar==='venue_logo' && o._isZoneRect; });
          if (gi.venue_picture_url && (vLogoImage || vLogoZone)) {
            pending++;
            fabric.Image.fromURL(gi.venue_picture_url, function(img) {
              if (img) {
                var ref = vLogoImage || vLogoZone;
                if (vLogoImage) {
                  img.set({ left:vLogoImage.left, top:vLogoImage.top,
                    scaleX:vLogoImage.scaleX||1, scaleY:vLogoImage.scaleY||1, angle:vLogoImage.angle||0,
                    originX:vLogoImage.originX||'left', originY:vLogoImage.originY||'top',
                    shadow:vLogoImage.shadow, opacity:vLogoImage.opacity!=null?vLogoImage.opacity:1, _tplVar:'venue_logo' });
                } else {
                  var vzW = vLogoZone.width*(vLogoZone.scaleX||1), vzH = vLogoZone.height*(vLogoZone.scaleY||1);
                  var vsc = Math.min(vzW/img.width, vzH/img.height, 1);
                  img.set({ left:vLogoZone.left+vzW/2, top:vLogoZone.top+vzH/2,
                    scaleX:vsc, scaleY:vsc, originX:'center', originY:'center',
                    shadow:new fabric.Shadow({color:'rgba(0,0,0,0.8)',blur:20}), _tplVar:'venue_logo' });
                }
                fc.remove(ref); fc.add(img);
              }
              // Keep border on top
              fc.getObjects().filter(function(o){return o._isBorder;}).forEach(function(o){fc.bringToFront(o);});
              maybeFinish();
            });
          }

          // ── Artist Logo ──
          if (!gi.artist_picture_url) { if (!pending) finish(); return; }

          var logoImage = objs.find(function(o) { return o._tplVar==='artist_logo' && o.type==='image'; });
          var logoZone  = objs.find(function(o) { return o._tplVar==='artist_logo' && o._isZoneRect; });
          var logoText  = objs.find(function(o) { return o._tplVar==='artist_logo' && o.text!==undefined; });

          if (logoImage || logoZone || logoText) {
            pending++;
            fabric.Image.fromURL(gi.artist_picture_url, function(img) {
              if (img) {
                if (logoImage) {
                  img.set({ left:logoImage.left, top:logoImage.top,
                    scaleX:logoImage.scaleX||1, scaleY:logoImage.scaleY||1, angle:logoImage.angle||0,
                    originX:logoImage.originX||'left', originY:logoImage.originY||'top',
                    shadow:logoImage.shadow, opacity:logoImage.opacity!=null?logoImage.opacity:1, _tplVar:'artist_logo' });
                  fc.remove(logoImage); fc.add(img);
                  fc.getObjects().filter(function(o){return o._isBorder;}).forEach(function(o){fc.bringToFront(o);});
                } else if (logoZone) {
                  var zoneW = logoZone.width*(logoZone.scaleX||1), zoneH = logoZone.height*(logoZone.scaleY||1);
                  var sc = Math.min(zoneW/img.width, zoneH/img.height, 1);
                  img.set({ left:logoZone.left+zoneW/2, top:logoZone.top+zoneH/2,
                    scaleX:sc, scaleY:sc, originX:'center', originY:'center',
                    shadow:new fabric.Shadow({color:'rgba(0,0,0,0.8)',blur:20}), _tplVar:'artist_logo' });
                  fc.remove(logoZone); fc.add(img);
                  fc.getObjects().filter(function(o){return o._isBorder;}).forEach(function(o){fc.bringToFront(o);});
                } else {
                  var tw = canvasW*0.94, th = canvasH-logoText.top-canvasH*0.03;
                  var s2 = Math.min(tw/img.width, th/img.height, 1);
                  img.set({ left:canvasW/2, top:logoText.top+th/2, scaleX:s2, scaleY:s2,
                    originX:'center', originY:'center', shadow:logoText.shadow, _tplVar:'artist_logo' });
                  fc.remove(logoText); fc.add(img);
                  fc.getObjects().filter(function(o){return o._isBorder;}).forEach(function(o){fc.bringToFront(o);});
                }
                objs.forEach(function(o) { if (o._tplVar==='artist_name') o.visible = false; });
              }
              maybeFinish();
            });
          }

          if (!pending) finish();
        }, reviver);
      } catch(e) {
        console.error('Flyer render error:', e);
        var sp = document.getElementById('_pfSpinner'); if (sp) sp.style.display='none';
            var dlPh = document.getElementById('_pfDlPlaceholder');
            if (dlPh) {
              var dlUrl = fc.toDataURL({format:'jpeg', quality:0.92, multiplier: Math.round((window.devicePixelRatio||1) * Math.min(1400/canvasW, 2))});
              dlPh.outerHTML = '<a href="' + dlUrl + '" download="' + _gigFileName + '.jpg" style="padding:9px 22px;background:rgba(139,92,246,0.85);color:#fff;border:1px solid rgba(139,92,246,0.6);border-radius:8px;font-size:0.85rem;font-weight:600;text-decoration:none;cursor:pointer;">&#11015; Download Flyer</a>';
            }
      }
    }

    if (typeof fabric !== 'undefined') { doRender(); }
    else { var s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js'; s.onload=doRender; document.head.appendChild(s); }
    return;
  }

  // use_builtin: build the default template layout client-side from gig_info, then render via canvas path
  if (data && data.use_builtin && data.gig_info) {
    var gi = data.gig_info || {};
    // Multi-slot hoist
    if (!gi.artist_picture_url && gi.slots && gi.slots.length) {
      var sl = gi.slots.find(function(s){return s.artist_id;}) || gi.slots[0];
      if (sl) { gi.artist_name = gi.artist_name || sl.artist_name; gi.artist_picture_url = gi.artist_picture_url || sl.artist_picture_url; }
    }
    _showFlyerOverlay({ canvas_data: _buildBuiltinFlyerJSON(gi), gig_info: gi }, modalId);
    return;
  }

  fm.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;" onclick="event.stopPropagation()"><div style="font-size:3rem;">&#127912;</div><div style="color:#e2e8f0;font-size:1.1rem;font-weight:600;">Flyer Coming Soon</div><div style="color:#94a3b8;font-size:0.85rem;">The venue is preparing an event flyer for this gig.</div>' + closeBtn + '</div>';
}

    function closeGigModal() {
      const m = document.getElementById('gigModal');
      m.classList.add('hidden');
      m.querySelector('.gig-modal').classList.remove('day-modal');
    }
    document.getElementById('gigModal').addEventListener('click', function(e) { if (e.target === this) closeGigModal(); });

    async function openDayGigsModal(e, ds) {
      // Only fire when clicking the cell background, not a gig bubble
      if (e.target.closest('.cal-gig')) return;
      const dayGigs = venueGigs.filter(g => g.date === ds);
      if (!dayGigs.length) return;

      // Prefetch slots for all gigs
      await Promise.all(dayGigs.map(async g => {
        try {
          const r = await fetch(`/api/gigs/${g.id}/slots`);
          if (r.ok) g._daySlots = (await r.json()).sort((a,b) => (a.start_time||'').localeCompare(b.start_time||''));
        } catch(e) {}
      }));

      const [y, mo, d] = ds.split('-').map(Number);
      const dateStr = new Date(y, mo-1, d).toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

      const icons = {'Live Band':'🎸','DJ':'🎧','Comedian':'🎤','Trivia Host':'🧠'};

      let rows = dayGigs.map(g => {
        const isBooked = g.status === 'booked' || (g.is_multi_slot && g.booked_slots_count > 0);
        const gigBg    = isBooked ? 'linear-gradient(135deg,#ef4444,#b91c1c)' : 'linear-gradient(135deg,#10b981,#059669)';
        const gigBorder= isBooked ? '#b91c1c' : '#059669';
        const gigColor = isBooked ? '#ffffff' : '#000000';
        const icon = icons[g.artist_type] || '🎵';
        const time = fmtTime(g.start_time) + (g.end_time ? ' – ' + fmtTime(g.end_time) : '');
        const loc = [venueData?.city, venueData?.state].filter(Boolean).join(', ');
        let artistTypeDisplay = g.artist_type || 'Any';
        if (g.artist_type === 'Live Band' && g.band_formats)
          artistTypeDisplay += ' • ' + g.band_formats.split(',').map(f=>f.trim()).join(', ');

        // Artist name from prefetched slots or gig directly
        let artistDisplay = '';
        if (!isBooked) {
          artistDisplay = `<span style="opacity:0.75;">OPEN</span>`;
        } else if (g._daySlots) {
          const bookedSlots = g._daySlots.filter(s => s.status === 'booked' && s.artist_name);
          artistDisplay = bookedSlots.length === 0
            ? '<span style="opacity:0.75;">Booked</span>'
            : bookedSlots.map(s => `<a href="/app/artist-profile.html?artist_id=${s.artist_id}" target="_blank" onclick="event.stopPropagation()" style="color:${gigColor};text-decoration:underline;font-weight:600;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">${esc(s.artist_name)}</a>`).join('<br>');
        } else if (g.artist_name) {
          artistDisplay = `<a href="/app/artist-profile.html?artist_id=${g.artist_id}" target="_blank" onclick="event.stopPropagation()" style="color:${gigColor};text-decoration:underline;font-weight:600;">${esc(g.artist_name)}</a>`;
        } else {
          artistDisplay = '<span style="opacity:0.75;">Booked</span>';
        }

        return `<div onclick="openDayGigDetail(${g.id},'${ds}')" style="display:grid;grid-template-columns:130px minmax(130px,1fr) minmax(120px,1fr) minmax(120px,1fr) minmax(150px,1.5fr);column-gap:12px;align-items:center;padding:6px 10px;margin:0;border:1px solid ${gigBorder};border-radius:6px;background:${gigBg};color:${gigColor};font-weight:700;white-space:nowrap;cursor:pointer;line-height:1.3;">
          <div>${icon} ${time}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;">${esc(g.venue_name || venueData?.venue_name || '')}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;">${esc(loc)}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;">${artistDisplay}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;">${esc(artistTypeDisplay)}</div>
        </div>`;
      }).join('');

      const modal = document.getElementById('gigModal');
      modal.querySelector('.gig-modal').classList.add('day-modal');
      modal.querySelector('h3').textContent = dateStr;
      document.getElementById('gigModalBody').innerHTML =
        `<div style="display:grid;grid-auto-rows:auto;row-gap:10px;width:100%;min-width:820px;font-size:0.7rem;">${rows}</div>`;
      modal.classList.remove('hidden');
    }

    function openDayGigDetail(gigId, ds) {
      const dayGigs = venueGigs.filter(g => g.date === ds);
      const idx = dayGigs.findIndex(g => g.id === gigId);
      if (idx >= 0) {
        document.getElementById('gigModal').querySelector('.gig-modal').classList.remove('day-modal');
        showGigDetail(ds, idx);
      }
    }

    // ========== MEDIA ==========
    function ytThumb(url) { const m = url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/); return m ? `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg` : "/app/static/img/video-placeholder.svg"; }
    async function loadMedia() {
      const res = await fetch(`/api/venues/${venueId}/media`, { credentials: "include" }); if (!res.ok) return;
      const media = await res.json();
      const pics = document.getElementById("pictures"), videos = document.getElementById("videos");
      media.forEach(m => {
        if (m.media_type === "profile") document.getElementById("venueLogo").src = m.file_path;
        if (m.media_type === "picture") { const d = document.createElement("div"); d.className = "media-card"; d.innerHTML = `<img src="${escAttr(m.file_path)}"><div class="media-title-label">${esc(m.title||"")}</div>`; d.onclick = () => openModal(m.file_path, "image"); pics.appendChild(d); }
        if (m.media_type === "video") { const d = document.createElement("div"); d.className = "media-card"; d.innerHTML = `<img src="${escAttr(ytThumb(m.video_url))}"><div class="media-title-label">${esc(m.title||"")}</div>`; d.onclick = () => openModal(m.video_url, "video"); videos.appendChild(d); }
      });
      if (!pics.children.length) document.getElementById('picturesEmpty').style.display = 'block';
      if (!videos.children.length) document.getElementById('videosEmpty').style.display = 'block';
    }
    // Media modal handled by venue-profile-init.js (uses #mediaModal)
    function openModal(src, type) {
      const modal = document.getElementById('mediaModal');
      const content = document.getElementById('mediaModalContent');
      if (!modal || !content) return;
      if (type === 'image') {
        content.innerHTML = `<img src="${escAttr(src)}" style="max-width:90vw;max-height:90vh;border-radius:12px;">`;
      } else {
        const yt = src.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
        content.innerHTML = yt
          ? `<iframe width="800" height="450" src="https://www.youtube.com/embed/${escAttr(yt[1])}" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen style="border-radius:12px;"></iframe>`
          : `<video controls src="${escAttr(src)}" style="max-width:90vw;max-height:90vh;border-radius:12px;"></video>`;
      }
      modal.classList.remove('hidden');
      modal.style.display = 'flex';
    }
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escAttr(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    async function loadVenueReviews(page) {
  if (!venueId) return;
  const list = document.getElementById('venueReviewsList');
  const pagination = document.getElementById('venueReviewsPagination');
  if (!list) return;

  try {
    // Load summary + paginated reviews in parallel
    const [summaryRes, reviewsRes] = await Promise.all([
      fetch(`/api/venues/${venueId}/reviews/summary`, { credentials: 'include' }),
      fetch(`/api/venues/${venueId}/reviews?page=${page}&limit=5`, { credentials: 'include' })
    ]);

    if (summaryRes.ok) {
      const s = await summaryRes.json();
      const badge = document.getElementById('reviewsBadge');
      const summary = document.getElementById('venueRatingSummary');
      if (s.review_count > 0) {
        if (badge) badge.textContent = `(${s.review_count})`;
        if (summary) {
          summary.style.display = 'flex';
          const stars = '★'.repeat(Math.round(s.avg_rating)) + '☆'.repeat(5 - Math.round(s.avg_rating));
          document.getElementById('venueAvgStars').textContent = stars;
          document.getElementById('venueAvgNum').textContent = parseFloat(s.avg_rating).toFixed(1);
          document.getElementById('venueReviewCount').textContent = `(${s.review_count} review${s.review_count !== 1 ? 's' : ''})`;
        }
      } else {
        if (badge) badge.textContent = '';
      }
    }

    if (!reviewsRes.ok) throw new Error('Failed to load reviews');
    const data = await reviewsRes.json();

    if (!data.reviews || data.reviews.length === 0) {
      list.innerHTML = '<p style="color:var(--text-muted); font-size:0.9rem; text-align:center; padding:20px 0;">No reviews yet. Artists who have performed here can leave a review.</p>';
      if (pagination) pagination.innerHTML = '';
      return;
    }

    list.innerHTML = data.reviews.map(r => {
      const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
      const date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      return `
        <div style="padding:16px 0; border-bottom:1px solid rgba(255,255,255,0.06);">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
            <div style="display:flex; align-items:center; gap:10px;">
              <a href="/app/artist-profile.html?artist_id=${r.artist_id}" target="_blank"
                 style="font-weight:600; font-size:0.9rem; color:var(--cyan); text-decoration:none;">${esc(r.artist_name || 'Artist')}</a>
              <span style="color:#f59e0b; font-size:1rem; letter-spacing:1px;">${stars}</span>
              <span style="font-size:0.78rem; font-weight:600; color:#f59e0b;">${r.rating}/5</span>
            </div>
            <span style="font-size:0.75rem; color:var(--text-muted);">${date}</span>
          </div>
          ${r.review_text ? `<p style="margin:0; font-size:0.85rem; color:var(--text-gray); line-height:1.6;">${esc(r.review_text)}</p>` : ''}
        </div>`;
    }).join('');

    // Pagination
    if (pagination) {
      if (data.pages <= 1) {
        pagination.innerHTML = '';
      } else {
        const btns = [];
        for (let p = 1; p <= data.pages; p++) {
          const active = p === data.page;
          btns.push(`<button onclick="loadVenueReviews(${p})" style="padding:4px 12px; border-radius:6px; font-size:0.8rem; cursor:pointer; background:${active ? 'rgba(6,182,212,0.2)' : 'transparent'}; border:1px solid ${active ? 'rgba(6,182,212,0.5)' : 'rgba(255,255,255,0.15)'}; color:${active ? '#06b6d4' : 'var(--text-muted)'};">${p}</button>`);
        }
        pagination.innerHTML = btns.join('');
      }
    }
  } catch (e) {
    if (list) list.innerHTML = '<p style="color:var(--text-muted); font-size:0.9rem;">Could not load reviews.</p>';
    console.error('loadVenueReviews:', e);
  }
}

// Make pagination buttons work globally
window.loadVenueReviews = loadVenueReviews;
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reset Password - GigsFill</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/app/static/img/gigsfill-logo_square.png">
  <link rel="manifest" href="/app/static/manifest.json">
  <link rel="apple-touch-icon" href="/app/static/img/gigsfill-logo_square.png">
  <meta name="theme-color" content="#0f1419">
  <link href="/app/static/css/gigsfill.css" rel="stylesheet">
  <link href="/app/static/css/mobile.css" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="logo"><img src="/app/static/img/gigsfill-logo.png" alt="GigsFill" style="height:44px;width:auto;flex-shrink:0;"></div>
      <div class="header-actions"></div>
    </div>
  </header>

  <div class="hero">
    <h1>Reset Password</h1>
    <p class="tagline">Enter your new password below</p>

    <div class="auth-panel" style="max-width: 420px; margin: 40px auto;">
      <form id="resetForm">
        <div class="field">
          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6">
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
        </div>

        <button class="btn primary" type="submit" style="width: 100%; margin-top: 20px;">Reset Password</button>
      </form>
    </div>
  </div>

<footer>
  © 2026 GigsFill. Built for the music community. · <a href="/app/legal.html" style="color: var(--text-gray); text-decoration: none; border-bottom: 1px solid rgba(148,163,184,0.3);">Terms &amp; Legal</a>
</footer>

  <script src="/app/static/js/modals.js"></script>
  

<script src="/app/static/js/reset_password-init.js"></script>
<script src="/app/static/js/maintenance-banner.js"></script>
<script src="/app/static/js/sw-register.js"></script>
</body>
</html>
